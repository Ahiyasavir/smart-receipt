name: Bank Sync

on:
  # Run automatically every 6 hours
  schedule:
    - cron: '0 */6 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install dependencies
        working-directory: scraper
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install

      # Secrets are injected as env vars so bash can test them safely.
      # An unset GitHub secret arrives as an empty string — skip if either is absent.
      - name: Check Supabase secrets
        id: secrets-check
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "available=true"  >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Supabase secrets not configured — sync will be skipped."
          fi

      - name: Run bank sync
        if: steps.secrets-check.outputs.available == 'true'
        working-directory: scraper
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          # ── Supabase (required) ──────────────────────────────────────────
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID:           ${{ secrets.SUPABASE_USER_ID }}

          # ── Bank Hapoalim ────────────────────────────────────────────────
          HAPOALIM_USER_CODE:         ${{ secrets.HAPOALIM_USER_CODE }}
          HAPOALIM_PASSWORD:          ${{ secrets.HAPOALIM_PASSWORD }}

          # ── Bank Leumi ───────────────────────────────────────────────────
          LEUMI_USERNAME:             ${{ secrets.LEUMI_USERNAME }}
          LEUMI_PASSWORD:             ${{ secrets.LEUMI_PASSWORD }}

          # ── Discount Bank ────────────────────────────────────────────────
          DISCOUNT_ID:                ${{ secrets.DISCOUNT_ID }}
          DISCOUNT_PASSWORD:          ${{ secrets.DISCOUNT_PASSWORD }}
          DISCOUNT_NUM:               ${{ secrets.DISCOUNT_NUM }}

          # ── Max / Leumi Card ─────────────────────────────────────────────
          MAX_USERNAME:               ${{ secrets.MAX_USERNAME }}
          MAX_PASSWORD:               ${{ secrets.MAX_PASSWORD }}

          # ── Mizrahi Tefahot ──────────────────────────────────────────────
          MIZRAHI_USERNAME:           ${{ secrets.MIZRAHI_USERNAME }}
          MIZRAHI_PASSWORD:           ${{ secrets.MIZRAHI_PASSWORD }}

          # ── Bank Yahav ───────────────────────────────────────────────────
          YAHAV_USERNAME:             ${{ secrets.YAHAV_USERNAME }}
          YAHAV_PASSWORD:             ${{ secrets.YAHAV_PASSWORD }}
          YAHAV_NATIONAL_ID:          ${{ secrets.YAHAV_NATIONAL_ID }}

          # ── First International (Beinleumi) ──────────────────────────────
          BEINLEUMI_USERNAME:         ${{ secrets.BEINLEUMI_USERNAME }}
          BEINLEUMI_PASSWORD:         ${{ secrets.BEINLEUMI_PASSWORD }}

        run: node sync.mjs
